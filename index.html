<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Holy Moment - 일일 성경 말씀 묵상</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&family=Pretendard:wght@300;400;600&display=swap"
        rel="stylesheet">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#6d5d6e">
    <link rel="apple-touch-icon" href="holy_moment_app_icon.png">
    <style>
        :root {
            --bg-color: #f8f9fa;
            --accent-color: #6d5d6e;
            --text-main: #343a40;
            --text-sub: #6c757d;
            --glass-bg: rgba(255, 255, 255, 0.75);
            --glass-border: rgba(255, 255, 255, 0.4);
            --shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Pretendard', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%),
                url('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&q=80&w=1920') center/cover no-repeat;
            background-blend-mode: overlay;
            min-height: 100vh;
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 30px;
            border: 1px solid var(--glass-border);
            box-shadow: var(--shadow);
            padding: 40px;
            animation: fadeIn 1.2s ease-out;
            position: relative;
        }

        /* 설정 아이콘 */
        .settings-trigger {
            position: absolute;
            top: 25px;
            right: 25px;
            font-size: 1.4rem;
            cursor: pointer;
            color: var(--accent-color);
            transition: transform 0.3s ease;
            z-index: 10;
        }

        .settings-trigger:hover {
            transform: rotate(45deg);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo {
            font-family: 'Noto Serif KR', serif;
            font-size: 1.4rem;
            color: var(--accent-color);
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 8px;
            display: block;
            font-weight: 700;
        }

        .current-time {
            font-size: 0.95rem;
            color: var(--text-sub);
            letter-spacing: 0.5px;
        }

        .verse-section {
            margin-bottom: 30px;
            text-align: center;
        }

        .verse-text {
            font-family: 'Noto Serif KR', serif;
            font-size: 1.6rem;
            line-height: 1.6;
            margin-bottom: 20px;
            color: #1a202c;
            word-break: keep-all;
            padding: 0 10px;
        }

        .verse-en {
            font-family: 'Pretendard', sans-serif;
            font-size: 1.05rem;
            line-height: 1.6;
            margin-bottom: 24px;
            color: var(--text-sub);
            font-style: italic;
            word-break: keep-all;
            padding: 0 20px;
            opacity: 0.9;
        }

        .verse-ref {
            font-size: 1.1rem;
            color: var(--accent-color);
            font-weight: 600;
            opacity: 0.9;
            margin-bottom: 5px;
        }

        /* 푸터 버전 표시 */
        .footer-info {
            text-align: center;
            margin-top: 30px;
            font-size: 0.8rem;
            color: var(--text-sub);
            opacity: 0.6;
        }

        /* 고도화 도구 모음 */
        .tool-bar {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 25px 0;
        }

        .tool-btn {
            background: white;
            border: 1px solid rgba(0, 0, 0, 0.08);
            width: 45px;
            height: 45px;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 1.2rem;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }

        .tool-btn:hover {
            transform: translateY(-2px);
            background: var(--accent-color);
            color: white;
            border-color: var(--accent-color);
        }

        .tool-btn:active {
            transform: translateY(0);
        }

        .interpretation-box {
            background: rgba(255, 255, 255, 0.4);
            padding: 28px;
            border-radius: 20px;
            margin-top: 10px;
            font-size: 1.05rem;
            line-height: 1.9;
            color: #2d3748;
            text-align: left;
            border-left: 5px solid var(--accent-color);
        }

        .interpretation-title {
            font-weight: 700;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--accent-color);
            font-size: 1.1rem;
        }

        .reflection-section {
            border-top: 1px solid rgba(0, 0, 0, 0.08);
            padding-top: 35px;
            margin-top: 35px;
        }

        .reflection-label {
            font-weight: 700;
            margin-bottom: 18px;
            display: block;
            color: var(--text-main);
            font-size: 1.1rem;
        }

        textarea {
            width: 100%;
            height: 120px;
            border-radius: 18px;
            border: 1px solid rgba(0, 0, 0, 0.12);
            background: rgba(255, 255, 255, 0.9);
            padding: 20px;
            font-family: inherit;
            font-size: 1.05rem;
            line-height: 1.6;
            resize: none;
            outline: none;
            transition: all 0.3s;
        }

        textarea:focus {
            border-color: var(--accent-color);
            background: #fff;
            box-shadow: 0 0 0 4px rgba(109, 93, 110, 0.1);
        }

        .save-btn {
            width: 100%;
            padding: 18px;
            margin-top: 20px;
            border: none;
            border-radius: 18px;
            background: var(--accent-color);
            color: white;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .save-btn:hover {
            background: #5a4d5a;
            transform: translateY(-2px);
        }

        .history-btn {
            background: none;
            border: none;
            color: var(--text-sub);
            font-size: 0.95rem;
            margin-top: 25px;
            cursor: pointer;
            width: 100%;
            text-align: center;
            opacity: 0.8;
        }

        /* 공통 모달 스타일 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(8px);
        }

        .modal-content {
            background: white;
            width: 90%;
            max-width: 550px;
            max-height: 85vh;
            border-radius: 30px;
            padding: 40px;
            overflow-y: auto;
            position: relative;
        }

        .close-modal {
            position: absolute;
            top: 20px;
            right: 25px;
            cursor: pointer;
            font-size: 2rem;
            color: #aaa;
        }

        /* 알람 설정 특정 스타일 */
        .alarm-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin: 20px 0;
        }

        .hour-chip {
            padding: 10px;
            border: 1px solid #eee;
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .hour-chip.active {
            background: var(--accent-color);
            color: white;
            border-color: var(--accent-color);
        }

        .alarm-toggle-group {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-bottom: 15px;
        }

        .small-btn {
            padding: 8px 12px;
            border-radius: 6px;
            border: 1px solid #ddd;
            background: #f9f9f9;
            font-size: 0.8rem;
            cursor: pointer;
        }

        @media (max-width: 480px) {
            .container {
                padding: 30px 20px;
            }

            .verse-text {
                font-size: 1.4rem;
            }

            .alarm-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }
    </style>
</head>

<body>

    <div class="container">
        
        <!-- 오디오 태그: 모바일 지원 백그라운드 사운드 -->
        <audio id="alarmAudio" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>
        <!-- 설정 아이콘 -->

        <div id="openSettings" class="settings-trigger" title="알람 설정">⚙️</div>

        <header>
            <span class="logo">Holy Moment</span>
            <div id="dateDisplay" class="current-time"></div>
        </header>

        <main>
            <section class="verse-section">
                <p id="verseText" class="verse-text">말씀을 불러오는 중입니다...</p>
                <p id="verseEn" class="verse-en"></p>
                <p id="verseRef" class="verse-ref"></p>

                <!-- 기능 버튼 레이어 -->
                <div class="tool-bar">
                    <button id="ttsBtn" class="tool-btn" title="말씀 읽기">🔊</button>
                    <button id="shareBtn" class="tool-btn" title="카톡/지인 공유">🔗</button>
                    <button id="copyBtn" class="tool-btn" title="복사하기">📄</button>
                </div>

                <div class="interpretation-box">
                    <span class="interpretation-title">📜 오늘의 묵상 가이드</span>
                    <p id="interpretationText">잠시만 기다려 주세요.</p>
                </div>
            </section>

            <section class="reflection-section">
                <label class="reflection-label">💭 나의 묵상 기록하기</label>
                <textarea id="reflectionInput" placeholder="이 말씀을 통해 느낀 점이나 기도를 적어보세요..."></textarea>
                <button id="saveBtn" class="save-btn">묵상 저장하기</button>
                <button id="showHistory" class="history-btn">지난 기록 보기</button>
            </section>

            <div class="footer-info">
                Holy Moment v2.1.0 | Paul & Hopeman Project
            </div>
        </main>
    </div>

    <!-- 알람 설정 모달 -->
    <div id="settingsModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" id="closeSettings">&times;</span>
            <h2 style="margin-bottom: 20px; font-family: 'Noto Serif KR', serif; color: var(--accent-color);">알람 시스템 설정
            </h2>
            <p style="font-size: 0.95rem; color: #666; margin-bottom: 20px; line-height: 1.6;">
                매 시간 정각에 말씀을 받아보실 시간대를 선택해 주세요. <br>
                <span style="color: var(--accent-color); font-weight: 600;">* 브라우저 알림 권한이 필요합니다.</span>
            </p>

            <div class="alarm-toggle-group">
                <button class="small-btn" onclick="toggleAllAlarms(true)">전체 선택</button>
                <button class="small-btn" onclick="toggleAllAlarms(false)">전체 해제</button>
            </div>

            <div id="alarmGrid" class="alarm-grid">
                <!-- 0시부터 23시까지 동적 생성 -->
            </div>

            <button id="saveSettings" class="save-btn" style="background: #2d3748;">설정 완료</button>
        </div>
    </div>

    <!-- 기존 기록 모달 -->
    <div id="historyModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" id="closeHistory">&times;</span>
            <h2 style="margin-bottom: 25px; font-family: 'Noto Serif KR', serif; color: var(--accent-color);">나의 묵상 기록
            </h2>
            <div id="historyList"></div>
        </div>
    </div>

        "interp": "세상의 방식이 아닌 믿음의 방식을 선택하십시오. (주님의 은혜를 매일 기억하며 살아가세요.)"
    }
];

        let alarmSettings = JSON.parse(localStorage.getItem('holy_moment_alarms') || '[7, 8, 9, 12, 18, 20, 21, 22]');
        let lastNotifiedHour = -1;

        
        function updateVerse() {
            const now = new Date();
            const hour = now.getHours();
            
            const start = new Date(now.getFullYear(), 0, 0);
            const diff = now - start;
            const oneDay = 1000 * 60 * 60 * 24;
            const dayOfYear = Math.floor(diff / oneDay);
            
            const verseIndex = (dayOfYear * 24 + hour) % bibleData.length;
            const data = bibleData[verseIndex];

            document.getElementById('dateDisplay').textContent = now.toLocaleDateString('ko-KR', {
                year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit'
            });

            document.getElementById('verseText').textContent = data.verse;
            document.getElementById('verseEn').textContent = data.verseEn;
            document.getElementById('verseRef').textContent = data.ref;
            document.getElementById('interpretationText').textContent = data.interp;

            loadCurrentReflection(hour);
            checkNotification(now, data);
        }


        // 알람 체크 로직
        
        function checkNotification(now, data) {
            const hour = now.getHours();
            const minute = now.getMinutes();

            // 매 정각~1분 내 알람 발송 (오디오 포함)
            if (alarmSettings.includes(hour) && lastNotifiedHour !== hour && minute === 0) {
                const audio = document.getElementById('alarmAudio');
                if (audio) {
                    audio.volume = 0.5;
                    audio.play().catch(e => console.log("Audio play blocked (user must interact first):", e));
                }

                if (Notification.permission === "granted") {
                    new Notification("✨ Holy Moment: 정각 말씀", {
                        body: '"' + data.verse + '"\n지금 앱에서 묵상을 시작해 보세요.',
                        icon: 'holy_moment_app_icon.png'
                    });
                }
                lastNotifiedHour = hour;
            }
        }


        function loadCurrentReflection(hour) {
            const dateStr = new Date().toDateString();
            const key = `reflection_${dateStr}_${hour}`;
            const saved = localStorage.getItem(key);
            document.getElementById('reflectionInput').value = saved || "";
        }

        // --- 고도화 기능: TTS (말씀 읽기) ---
        let synth = window.speechSynthesis;
        document.getElementById('ttsBtn').onclick = () => {
            if (synth.speaking) {
                synth.cancel();
                return;
            }
            const utter = new SpeechSynthesisUtterance(
                `${document.getElementById('verseText').textContent}. ${document.getElementById('verseEn').textContent}. ${document.getElementById('verseRef').textContent}. 묵상 가이드입니다. ${document.getElementById('interpretationText').textContent}`
            );
            utter.lang = 'ko-KR';
            utter.rate = 0.9;
            synth.speak(utter);
        };

        // --- 공유 및 복사 기능 ---
        function getShareMessage() {
            return `[Holy Moment 오늘의 말씀]\n\n"${document.getElementById('verseText').textContent}"\n("${document.getElementById('verseEn').textContent}")\n- ${document.getElementById('verseRef').textContent}\n\n오늘의 묵상: ${document.getElementById('interpretationText').textContent}`;
        }

        document.getElementById('copyBtn').onclick = () => {
            navigator.clipboard.writeText(getShareMessage()).then(() => alert("복사되었습니다! ✨"));
        };

        document.getElementById('shareBtn').onclick = () => {
            if (navigator.share) {
                navigator.share({ title: 'Holy Moment', text: getShareMessage(), url: window.location.href });
            } else { alert("복사 기능을 이용해 주세요! 😊"); }
        };

        // --- 알람 설정 UI 관련 ---
        const settingsModal = document.getElementById('settingsModal');
        const alarmGrid = document.getElementById('alarmGrid');

        function initAlarmUI() {
            alarmGrid.innerHTML = '';
            for (let i = 0; i < 24; i++) {
                const chip = document.createElement('div');
                chip.className = `hour-chip ${alarmSettings.includes(i) ? 'active' : ''}`;
                chip.textContent = `${i}시`;
                chip.onclick = () => {
                    if (alarmSettings.includes(i)) {
                        alarmSettings = alarmSettings.filter(h => h !== i);
                        chip.classList.remove('active');
                    } else {
                        alarmSettings.push(i);
                        chip.classList.add('active');
                    }
                };
                alarmGrid.appendChild(chip);
            }
        }

        function toggleAllAlarms(select) {
            if (select) {
                alarmSettings = Array.from({ length: 24 }, (_, i) => i);
            } else {
                alarmSettings = [];
            }
            initAlarmUI();
        }

        document.getElementById('openSettings').onclick = () => {
            initAlarmUI();
            settingsModal.style.display = 'flex';
        };

        document.getElementById('saveSettings').onclick = () => {
            localStorage.setItem('holy_moment_alarms', JSON.stringify(alarmSettings));
            if (alarmSettings.length > 0 && Notification.permission !== "granted") {
                Notification.requestPermission().then(permission => {
                    if (permission === "granted") alert("알람 설정이 저장되었으며, 알림 권한이 승인되었습니다. 🙏");
                });
            } else {
                alert("알람 설정이 안전하게 저장되었습니다. ✨");
            }
            settingsModal.style.display = 'none';
        };

        // --- 데이터베이스화된 기록 관리 ---
        const historyModal = document.getElementById('historyModal');
        document.getElementById('showHistory').onclick = () => {
            const history = JSON.parse(localStorage.getItem("holy_moment_history") || "[]");
            const list = document.getElementById('historyList');
            list.innerHTML = history.length ? "" : "<p style='text-align: center; color: #888; padding: 40px;'>기록된 묵상이 없습니다.</p>";

            history.forEach(item => {
                const div = document.createElement('div');
                div.style = "border-bottom: 1px solid #eee; margin-bottom: 20px; padding-bottom: 15px; animation: fadeIn 0.5s ease-out;";
                div.innerHTML = `
                    <p style="font-size: 0.85rem; color: var(--accent-color); font-weight: 600; margin-bottom: 5px;">📅 ${item.fullTimestamp || item.date}</p>
                    <p style="font-weight: 700; font-family: 'Noto Serif KR', serif; margin-bottom: 8px; font-size: 1.05rem;">${item.verse}</p>
                    <p style="font-size: 1rem; line-height: 1.6; color: #444; white-space: pre-wrap; background: #fdfdfd; padding: 10px; border-radius: 8px;">${item.content}</p>
                `;
                list.appendChild(div);
            });
            historyModal.style.display = 'flex';
        };

        document.getElementById('closeSettings').onclick = () => settingsModal.style.display = 'none';
        document.getElementById('closeHistory').onclick = () => historyModal.style.display = 'none';
        window.onclick = (e) => {
            if (e.target == settingsModal) settingsModal.style.display = 'none';
            if (e.target == historyModal) historyModal.style.display = 'none';
        };

        document.getElementById('saveBtn').onclick = function () {
            const text = document.getElementById('reflectionInput').value;
            if (!text.trim()) return alert("내용을 입력해주세요. ✨");

            const now = new Date();
            const hour = now.getHours();
            const dateStr = now.toDateString();

            // 상세 시간 포맷 (YYYY-MM-DD HH:mm:ss)
            const fullTimestamp = now.getFullYear() + "-" +
                String(now.getMonth() + 1).padStart(2, '0') + "-" +
                String(now.getDate()).padStart(2, '0') + " " +
                String(now.getHours()).padStart(2, '0') + ":" +
                String(now.getMinutes()).padStart(2, '0') + ":" +
                String(now.getSeconds()).padStart(2, '0');

            const key = `reflection_${dateStr}_${hour}`;
            localStorage.setItem(key, text);

            let history = JSON.parse(localStorage.getItem("holy_moment_history") || "[]");
            history.unshift({
                date: now.toLocaleDateString(),
                fullTimestamp: fullTimestamp, // 상세 시간 저장
                verse: document.getElementById('verseText').textContent,
                content: text
            });

            if (history.length > 100) history.pop(); // 데이터베이스 용량 확장
            localStorage.setItem("holy_moment_history", JSON.stringify(history));
            alert("상세 날짜와 함께 안전하게 저장되었습니다. 🙏 v2.1.0");
        };

        updateVerse();
        setInterval(updateVerse, 30000); // 30초마다 체크

        // PWA 서비스 워커 등록
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('Service Worker registered!'))
                    .catch(err => console.log('SW registration failed:', err));
            });
        }
    </script>
</body>

</html>
